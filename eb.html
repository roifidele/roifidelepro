<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Next Level Congo | Salons Privés VIP - Cinéma & Gaming</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Angular CDN (v18) -->
  <script src="https://unpkg.com/@angular/core@18.2.0/core.umd.js"></script>
  <script src="https://unpkg.com/@angular/common@18.2.0/common.umd.js"></script>
  <script src="https://unpkg.com/@angular/compiler@18.2.0/compiler.umd.js"></script>
  <script src="https://unpkg.com/@angular/platform-browser@18.2.0/platform-browser.umd.js"></script>
  <script src="https://unpkg.com/@angular/platform-browser-dynamic@18.2.0/platform-browser-dynamic.umd.js"></script>
  <script src="https://unpkg.com/@angular/forms@18.2.0/forms.umd.js"></script>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Urbanist + Orbitron -->
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Urbanist', sans-serif;
    }
    .font-gaming {
      font-family: 'Orbitron', monospace;
    }
    body {
      background: #03010a;
      overflow-x: hidden;
    }
    /* Animated gradient background */
    .bg-animated {
      background: radial-gradient(circle at 20% 30%, #0a0218, #020008);
      position: relative;
    }
    .glow-card {
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
    }
    .glow-card:hover {
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
      transform: translateY(-8px);
    }
    .glass-deep {
      background: rgba(8, 12, 25, 0.65);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(139, 92, 246, 0.35);
      border-radius: 2rem;
    }
    .neon-text {
      text-shadow: 0 0 8px #a855f7, 0 0 20px #7c3aed;
    }
    .btn-primary-glow {
      background: linear-gradient(95deg, #7c3aed, #c026d3);
      transition: all 0.3s;
    }
    .btn-primary-glow:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 20px #a855f7;
      transform: scale(1.02);
    }
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }
    .animate-float-slow {
      animation: float-slow 6s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0% { border-color: rgba(139, 92, 246, 0.3); }
      100% { border-color: rgba(139, 92, 246, 0.9); }
    }
    .input-focus-glow:focus {
      border-color: #c084fc;
      box-shadow: 0 0 12px #a855f7;
      outline: none;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0415;
    }
    ::-webkit-scrollbar-thumb {
      background: #8b5cf6;
      border-radius: 10px;
    }
  </style>
</head>
<body class="bg-animated text-gray-100">

  <app-root>Loading Next Level Experience...</app-root>

  <script>
    // Angular modules
    const { Component, NgModule } = ng.core;
    const { BrowserModule } = ng.platformBrowser;
    const { FormsModule } = ng.forms;

    // App Component
    class NextLevelApp {
      constructor() {
        // State
        this.step = 'offers'; // offers, form, confirmation
        this.selectedType = null; // 'vip' or 'standard'
        this.isSubmitting = false;
        this.toast = { show: false, message: '' };
        
        // Formulaire réservation
        this.booking = {
          fullName: '',
          email: '',
          phone: '',
          date: '',
          timeSlot: '',
          guests: 2,
          occasion: ''
        };
        
        this.timeSlots = [
          '10:00 - 12:00', 
          '12:30 - 14:30', 
          '15:00 - 17:00', 
          '17:30 - 19:30', 
          '20:00 - 22:00'
        ];
        
        this.confirmedBooking = null;
        
        // Available dates : min = today
        const today = new Date().toISOString().split('T')[0];
        this.minDate = today;
      }
      
      // Sélection VIP ou Standard
      selectOffer(type) {
        this.selectedType = type;
        this.step = 'form';
        window.scrollTo({ top: document.getElementById('reservePanel').offsetTop - 40, behavior: 'smooth' });
      }
      
      goBackToOffers() {
        this.step = 'offers';
        this.selectedType = null;
      }
      
      // Validation et soumission (simulée)
      submitReservation() {
        // Validations simples
        if (!this.booking.fullName.trim()) {
          this.showToastMsg('Veuillez indiquer votre nom complet');
          return;
        }
        if (!this.booking.email.includes('@') || !this.booking.email) {
          this.showToastMsg('Email valide requis');
          return;
        }
        if (!this.booking.phone.trim()) {
          this.showToastMsg('Numéro de téléphone requis');
          return;
        }
        if (!this.booking.date) {
          this.showToastMsg('Sélectionnez une date');
          return;
        }
        if (!this.booking.timeSlot) {
          this.showToastMsg('Choisissez un créneau horaire');
          return;
        }
        
        this.isSubmitting = true;
        // Simulation API
        setTimeout(() => {
          const id = 'NLC' + Math.floor(Math.random() * 90000) + 1000;
          this.confirmedBooking = {
            ...this.booking,
            offer: this.selectedType,
            reservationId: id,
            date: this.booking.date,
            timeSlot: this.booking.timeSlot
          };
          this.isSubmitting = false;
          this.step = 'confirmation';
          window.scrollTo({ top: document.getElementById('reservePanel').offsetTop - 40, behavior: 'smooth' });
        }, 800);
      }
      
      // Réinitialiser après confirmation
      resetBooking() {
        this.step = 'offers';
        this.selectedType = null;
        this.booking = {
          fullName: '', email: '', phone: '', date: '', timeSlot: '', guests: 2, occasion: ''
        };
        this.confirmedBooking = null;
      }
      
      // Redirection WhatsApp (booking direct)
      whatsappDirect() {
        let message = `Bonjour Next Level Congo ! Je souhaite réserver un salon ${this.selectedType === 'vip' ? 'VIP 18+' : 'Standard'}. Nom: ${this.booking.fullName || 'Client'}. Tél: ${this.booking.phone || 'non spécifié'}.`;
        if(this.booking.date) message += ` Date souhaitée: ${this.booking.date}.`;
        const url = `https://wa.me/243826123456?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
      }
      
      showToastMsg(msg) {
        this.toast.message = msg;
        this.toast.show = true;
        setTimeout(() => { this.toast.show = false; }, 3200);
      }
      
      getOfferLabel() {
        return this.selectedType === 'vip' ? 'VIP 18+ (Premium)' : 'Standard (Familial)';
      }
      
      getOfferIcon() {
        return this.selectedType === 'vip' ? 'fa-crown' : 'fa-film';
      }
    }
    
    // Définition du composant avec template
    NextLevelApp.annotations = [
      new Component({
        selector: 'app-root',
        template: `
          <!-- Toast Notifications -->
          <div *ngIf="toast.show" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[100] bg-gradient-to-r from-purple-800 to-fuchsia-800 text-white px-7 py-3 rounded-full shadow-2xl border border-purple-300 font-bold flex items-center gap-3 backdrop-blur-md text-sm md:text-base animate-pulse">
            <i class="fas fa-bell"></i> {{ toast.message }}
          </div>
          
          <!-- HERO SECTION ÉPIC -->
          <section class="relative min-h-screen flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80')] bg-cover bg-center opacity-25 blur-sm scale-110"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-black via-purple-950/50 to-black"></div>
            
            <div class="relative z-10 text-center px-6 max-w-6xl mx-auto animate-float-slow">
              <div class="inline-flex items-center gap-2 bg-black/40 backdrop-blur-sm border border-purple-500 rounded-full px-5 py-2 mb-6">
                <i class="fas fa-map-pin text-purple-400 text-sm"></i>
                <span class="text-xs font-gaming tracking-wider">KINSHASA · PREMIUM LOUNGE</span>
              </div>
              <h1 class="text-6xl md:text-8xl font-gaming font-black tracking-tighter">
                <span class="bg-gradient-to-r from-purple-400 via-fuchsia-500 to-pink-500 bg-clip-text text-transparent">NEXT LEVEL</span><br>
                <span class="text-white drop-shadow-2xl">CONGO</span>
              </h1>
              <p class="text-xl md:text-2xl text-gray-300 max-w-3xl mx-auto mt-6 font-light">Salons privés · Cinéma immersif 4K · Gaming Next-Gen<br>Réservez en ligne, vivez l'instant, payez sur place.</p>
              
              <div class="flex flex-wrap justify-center gap-5 mt-12">
                <button (click)="selectOffer('vip')" class="btn-primary-glow px-8 py-4 rounded-full text-lg font-bold flex items-center gap-3 shadow-2xl transition">
                  <i class="fas fa-gem text-yellow-300"></i> SALON VIP 18+
                </button>
                <button (click)="selectOffer('standard')" class="bg-gray-900/80 backdrop-blur border border-purple-500/50 hover:bg-gray-800/90 px-8 py-4 rounded-full text-lg font-bold flex items-center gap-3 transition">
                  <i class="fas fa-users"></i> SALON STANDARD
                </button>
              </div>
              
              <div class="grid grid-cols-2 md:flex md:justify-center gap-6 mt-16 text-sm font-gaming text-purple-300">
                <div><i class="fas fa-film mr-2"></i> Écran géant</div>
                <div><i class="fas fa-gamepad mr-2"></i> PS5 / PC Ultra</div>
                <div><i class="fas fa-popcorn mr-2"></i> Pop-corn offert</div>
                <div><i class="fas fa-lock mr-2"></i> 100% privé</div>
              </div>
            </div>
            <div class="absolute bottom-6 left-0 right-0 text-center animate-bounce">
              <a href="#offersSection" class="text-gray-400 hover:text-white text-2xl"><i class="fas fa-chevron-circle-down"></i></a>
            </div>
          </section>
          
          <!-- SECTION OFFRES DÉTAILLÉES -->
          <section id="offersSection" class="py-24 px-6 md:px-12 relative">
            <div class="max-w-7xl mx-auto">
              <div class="text-center mb-16">
                <h2 class="text-4xl md:text-5xl font-gaming font-bold"><span class="bg-gradient-to-r from-purple-300 to-fuchsia-400 bg-clip-text text-transparent">Expériences sur mesure</span></h2>
                <div class="w-28 h-1 bg-gradient-to-r from-purple-500 to-fuchsia-500 mx-auto mt-4 rounded-full"></div>
                <p class="text-gray-400 mt-5 text-lg">Deux univers, une promesse : un divertissement d'exception</p>
              </div>
              
              <div class="grid lg:grid-cols-2 gap-10">
                <!-- CARD VIP ULTRA -->
                <div class="glow-card rounded-3xl overflow-hidden bg-gradient-to-br from-purple-900/40 to-black/80 border border-purple-500/40 p-1">
                  <div class="p-8">
                    <div class="flex justify-between items-start">
                      <div>
                        <div class="text-3xl font-gaming font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-purple-300">VIP COLLECTION</div>
                        <div class="flex items-center gap-2 mt-1"><i class="fas fa-skull text-red-400 text-sm"></i><span class="text-xs font-bold text-red-300">Réservé 18+ · Identité requise</span></div>
                      </div>
                      <i class="fas fa-crown text-5xl text-yellow-500/80"></i>
                    </div>
                    <ul class="mt-6 space-y-4">
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-purple-400 w-5"></i> Salle ultra privée (capacité 2-6 pers)</li>
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-purple-400 w-5"></i> Écran cinéma 4K + Son Dolby Atmos</li>
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-purple-400 w-5"></i> Gaming : PS5, PC Gaming RTX, manettes pro</li>
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-purple-400 w-5"></i> Boisson premium offerte + Pop-corn gourmet</li>
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-purple-400 w-5"></i> Service concierge & accès coupe-file</li>
                    </ul>
                    <div class="mt-8">
                      <button (click)="selectOffer('vip')" class="w-full bg-purple-700 hover:bg-purple-600 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition shadow-lg"><i class="fas fa-ticket-alt"></i> RÉSERVER MAINTENANT</button>
                      <p class="text-center text-xs text-purple-300 mt-3">Paiement à l'arrivée · À partir de 45$/personne</p>
                    </div>
                  </div>
                </div>
                
                <!-- CARD STANDARD -->
                <div class="glow-card rounded-3xl overflow-hidden bg-gradient-to-br from-indigo-900/30 to-black/70 border border-indigo-500/30 p-1">
                  <div class="p-8">
                    <div class="flex justify-between">
                      <div>
                        <div class="text-3xl font-gaming font-black text-indigo-300">STANDARD</div>
                        <div class="text-green-400 text-xs mt-1"><i class="fas fa-child"></i> Tout public · Idéal famille/amis</div>
                      </div>
                      <i class="fas fa-clapperboard text-5xl text-indigo-400/80"></i>
                    </div>
                    <ul class="mt-6 space-y-4">
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-indigo-400"></i> Salon confortable et climatisé</li>
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-indigo-400"></i> Choix entre films à la demande ou jeux vidéo</li>
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-indigo-400"></i> Pop-corn offert à volonté</li>
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-indigo-400"></i> Ambiance sécurisée, adaptée aux enfants</li>
                      <li class="flex items-center gap-3"><i class="fas fa-check-circle text-indigo-400"></i> Parfait pour anniversaires, sorties en groupe</li>
                    </ul>
                    <div class="mt-8">
                      <button (click)="selectOffer('standard')" class="w-full bg-indigo-700 hover:bg-indigo-600 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition"><i class="fas fa-calendar-check"></i> RÉSERVER STANDARD</button>
                      <p class="text-center text-xs text-indigo-300 mt-3">À partir de 15$/personne · Paiement sur place</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
          
          <!-- SECTION RÉSERVATION DYNAMIQUE (ANGULAR) -->
          <div id="reservePanel" class="px-6 md:px-12 pb-24">
            <div class="max-w-5xl mx-auto glass-deep p-6 md:p-10 rounded-3xl shadow-2xl transition-all">
              <!-- ÉTAPE 1 : Choix d'offre si aucune sélection -->
              <div *ngIf="step === 'offers'" class="text-center py-8">
                <i class="fas fa-couch text-6xl text-purple-400 mb-5 opacity-80"></i>
                <h3 class="text-3xl font-gaming font-bold">Prêt à réserver ?</h3>
                <p class="text-gray-300 mt-3 max-w-lg mx-auto">Sélectionnez une expérience ci-dessus et complétez votre réservation en quelques clics.</p>
                <div class="flex flex-wrap justify-center gap-4 mt-8">
                  <button (click)="selectOffer('vip')" class="bg-purple-700/80 hover:bg-purple-700 px-7 py-3 rounded-full font-bold"><i class="fas fa-crown mr-2"></i> VIP 18+</button>
                  <button (click)="selectOffer('standard')" class="bg-indigo-700/80 hover:bg-indigo-700 px-7 py-3 rounded-full font-bold"><i class="fas fa-users mr-2"></i> Standard</button>
                </div>
              </div>
              
              <!-- ÉTAPE 2 : Formulaire de réservation -->
              <div *ngIf="step === 'form' && selectedType" class="transition-all duration-300">
                <div class="flex flex-wrap justify-between items-center border-b border-purple-500/40 pb-4 mb-6">
                  <div>
                    <h3 class="text-2xl md:text-3xl font-gaming font-bold"><i class="fas fa-{{ getOfferIcon() }} mr-3 text-purple-400"></i> Réserver · {{ getOfferLabel() }}</h3>
                    <p class="text-sm text-purple-300 mt-1">Remplissez vos coordonnées, nous confirmons sous 30 min</p>
                  </div>
                  <button (click)="goBackToOffers()" class="text-sm text-purple-300 hover:text-white transition"><i class="fas fa-arrow-left mr-1"></i> Autre offre</button>
                </div>
                
                <div class="grid md:grid-cols-2 gap-6">
                  <div>
                    <label class="block text-sm font-semibold mb-1"><i class="fas fa-user mr-1"></i> Nom complet *</label>
                    <input [(ngModel)]="booking.fullName" type="text" class="w-full bg-black/60 border border-purple-500/40 rounded-xl p-3 focus:input-focus-glow transition" placeholder="Jean-Claude M.">
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1"><i class="fas fa-envelope mr-1"></i> Email *</label>
                    <input [(ngModel)]="booking.email" type="email" class="w-full bg-black/60 border border-purple-500/40 rounded-xl p-3 focus:input-focus-glow" placeholder="contact@exemple.com">
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1"><i class="fab fa-whatsapp mr-1"></i> WhatsApp / Téléphone *</label>
                    <input [(ngModel)]="booking.phone" type="tel" class="w-full bg-black/60 border border-purple-500/40 rounded-xl p-3" placeholder="+243 8XX XX XX">
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1"><i class="fas fa-calendar-day mr-1"></i> Date souhaitée *</label>
                    <input [(ngModel)]="booking.date" type="date" [min]="minDate" class="w-full bg-black/60 border border-purple-500/40 rounded-xl p-3 text-white">
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1"><i class="fas fa-clock mr-1"></i> Créneau *</label>
                    <select [(ngModel)]="booking.timeSlot" class="w-full bg-black/60 border border-purple-500/40 rounded-xl p-3">
                      <option value="" disabled>-- Choisissez un horaire --</option>
                      <option *ngFor="let slot of timeSlots" [value]="slot">{{ slot }}</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1"><i class="fas fa-user-friends mr-1"></i> Nombre de personnes</label>
                    <input [(ngModel)]="booking.guests" type="number" min="1" max="12" class="w-full bg-black/60 border border-purple-500/40 rounded-xl p-3">
                  </div>
                  <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-1"><i class="fas fa-gift mr-1"></i> Occasion spéciale (anniversaire, soirée...)</label>
                    <input [(ngModel)]="booking.occasion" type="text" class="w-full bg-black/60 border border-purple-500/40 rounded-xl p-3" placeholder="Optionnel, on prépare une surprise !">
                  </div>
                </div>
                
                <div class="flex flex-wrap justify-between items-center gap-4 mt-8">
                  <button (click)="whatsappDirect()" class="bg-green-700 hover:bg-green-600 px-6 py-3 rounded-full flex items-center gap-2 font-semibold transition"><i class="fab fa-whatsapp text-xl"></i> Réserver via WhatsApp</button>
                  <button (click)="submitReservation()" [disabled]="isSubmitting" class="btn-primary-glow px-8 py-3 rounded-full font-bold flex items-center gap-2 disabled:opacity-50">
                    <i class="fas fa-check-circle"></i> {{ isSubmitting ? 'Envoi...' : 'Confirmer ma réservation' }}
                  </button>
                </div>
                <p class="text-xs text-gray-400 text-center mt-6 flex items-center justify-center gap-2"><i class="fas fa-shield-alt text-purple-400"></i> Réservation sans avance. Paiement 100% sur place. Consommation disponible.</p>
              </div>
              
              <!-- ÉTAPE 3 : Confirmation -->
              <div *ngIf="step === 'confirmation' && confirmedBooking" class="text-center py-4 animate__animated">
                <div class="bg-green-800/30 rounded-full w-28 h-28 flex items-center justify-center mx-auto border-2 border-green-400 shadow-xl">
                  <i class="fas fa-party-horn text-5xl text-green-400"></i>
                </div>
                <h3 class="text-3xl font-gaming font-bold mt-5">Réservation confirmée !</h3>
                <p class="text-gray-300 mt-2 max-w-md mx-auto">Votre salon {{ confirmedBooking.offer === 'vip' ? 'VIP' : 'Standard' }} est réservé.</p>
                <div class="glass-deep inline-block p-5 mt-6 text-left rounded-2xl border border-purple-500/30">
                  <p class="flex gap-2"><i class="fas fa-id-card text-purple-400 w-6"></i> <strong>{{ confirmedBooking.fullName }}</strong></p>
                  <p class="flex gap-2 mt-2"><i class="fas fa-calendar-alt text-purple-400 w-6"></i> {{ confirmedBooking.date }} | {{ confirmedBooking.timeSlot }}</p>
                  <p class="flex gap-2 mt-2"><i class="fas fa-tag text-purple-400 w-6"></i> Code : <span class="font-mono font-bold">{{ confirmedBooking.reservationId }}</span></p>
                  <p class="flex gap-2 mt-2"><i class="fas fa-phone-alt text-purple-400 w-6"></i> {{ confirmedBooking.phone }}</p>
                </div>
                <div class="flex flex-wrap justify-center gap-5 mt-8">
                  <button (click)="resetBooking()" class="bg-gray-800 hover:bg-gray-700 px-6 py-2 rounded-full transition"><i class="fas fa-plus-circle"></i> Nouvelle réservation</button>
                  <a href="https://wa.me/243826123456?text=Bonjour%2C%20j%27ai%20reçu%20ma%20réservation%20NLC" target="_blank" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-full flex items-center gap-2"><i class="fab fa-whatsapp"></i> Contacter le support</a>
                </div>
              </div>
            </div>
          </div>
          
          <!-- RÈGLEMENT & HORAIRES + TESTIMONIAUX -->
          <section class="py-16 px-6 bg-black/40 border-t border-purple-900/40">
            <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12">
              <div class="space-y-5">
                <div class="flex items-center gap-3"><i class="fas fa-gavel text-purple-400 text-2xl"></i><h3 class="text-2xl font-gaming font-bold">Bon à savoir</h3></div>
                <ul class="space-y-3 text-gray-300">
